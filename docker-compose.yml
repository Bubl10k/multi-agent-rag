services:
  backend:
    build:
      context: .
      dockerfile: rag/compose/local/Dockerfile
    ports:
      - "8000:8000"
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8000/api/health-check/ || exit 1" ]
      interval: 1m30s
      timeout: 10s
      retries: 3
      start_period: 40s
      start_interval: 5s
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./rag:/app/rag
    env_file:
      - .env
    networks:
      - app-network

  postgres:
    image: postgres:17.0-alpine3.20
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -q -d ${DB_NAME} -U ${DB_USER}" ]
      interval: 1m30s
      timeout: 5s
      retries: 3
      start_period: 40s
      start_interval: 5s

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge
